<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cotizador ML</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020817; font-family: 'DM Sans', sans-serif; color: #e2e8f0; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; }
  .grid-5 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; }
  .grid-modal { display: grid; grid-template-columns: 1.5fr 0.7fr 1fr 1fr 0.85fr; gap: 8px; align-items: center; }
  .grid-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media (max-width: 520px) {
    .grid-2 { grid-template-columns: 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr; }
    .grid-4 { grid-template-columns: 1fr 1fr; }
    .grid-5 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-modal { grid-template-columns: 1fr 1fr; }
    .grid-modal .modal-label { grid-column: 1 / -1; }
    .grid-3col { grid-template-columns: 1fr 1fr 1fr; }
    .grid-2col { grid-template-columns: 1fr 1fr; }
  }
</style>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+CiAgPHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzBiMTEyMCIvPgogIDx0ZXh0IHg9IjQiIHk9IjI0IiBmb250LXNpemU9IjIyIiBmb250LWZhbWlseT0ic2Fucy1zZXJpZiI+8J+TijwvdGV4dD4KPC9zdmc+" />
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

function useIsMobile() {
  const [mobile, setMobile] = useState(window.innerWidth <= 520);
  useEffect(() => {
    const handler = () => setMobile(window.innerWidth <= 520);
    window.addEventListener('resize', handler);
    return () => window.removeEventListener('resize', handler);
  }, []);
  return mobile;
}

// ─── Constantes de envío (valores de referencia · actualizar con datos reales) ───
const MIX = { flex: 40, colecta: 40, acuerdo: 15, otros: 5 };
const COSTO_FLEX_NETO = 4000;
const COSTO_COLECTA   = 9000;

function getCF(listing) {
  if (listing < 16000) return 1255;
  if (listing < 24000) return 2500;
  if (listing < 33000) return 3030;
  return 0;
}

function calcBase(costo, porgan, mlunipub, com, tax, pub = 0) {
  const listing = costo * (1 + porgan / 100) * mlunipub;
  const cf = getCF(listing);
  const ingreso = listing * (1 - com / 100 - tax / 100 - pub / 100);
  const costoTotal = costo * mlunipub;
  const margen = (ingreso - cf - costoTotal) / listing * 100;
  return { listing, cf, ingreso, margen };
}

function calcMargenModal(listing, costo, com, tax, costoEnvio, pub = 0, mlunipub = 1) {
  const ingreso = listing * (1 - com / 100 - tax / 100 - pub / 100);
  const costoTotal = costo * mlunipub;
  return (ingreso - costoEnvio - costoTotal) / listing * 100;
}

function solveForTarget(costo, mlunipub, com, tax, target, pub = 0) {
  let lo = 0, hi = 100000, mid;
  for (let i = 0; i < 100; i++) {
    mid = (lo + hi) / 2;
    const { margen } = calcBase(costo, mid, mlunipub, com, tax, pub);
    if (margen < target) lo = mid; else hi = mid;
  }
  return Math.round(mid);
}

function calcPonderado(listing, costo, com, tax, pub = 0, mlunipub = 1) {
  const mixTotal = MIX.flex + MIX.colecta + MIX.acuerdo;
  const mF = calcMargenModal(listing, costo, com, tax, COSTO_FLEX_NETO, pub, mlunipub);
  const mC = calcMargenModal(listing, costo, com, tax, COSTO_COLECTA, pub, mlunipub);
  const mA = calcMargenModal(listing, costo, com, tax, 0, pub, mlunipub);
  return (MIX.flex * mF + MIX.colecta * mC + MIX.acuerdo * mA) / mixTotal;
}

function solveForTargetPonderado(costo, mlunipub, com, tax, target, pub = 0) {
  let lo = 0, hi = 100000, mid;
  for (let i = 0; i < 100; i++) {
    mid = (lo + hi) / 2;
    const listing = costo * (1 + mid / 100) * mlunipub;
    const mP = calcPonderado(listing, costo, com, tax, pub, mlunipub);
    if (mP < target) lo = mid; else hi = mid;
  }
  return Math.round(mid);
}

const fmt$ = (n) => new Intl.NumberFormat("es-AR", {
  style: "currency", currency: "ARS", maximumFractionDigits: 0
}).format(n);
const fmtP = (n) => `${n.toFixed(1)}%`;
const margenColor = (v) =>
  v >= 30 ? "#22c55e" : v >= 23 ? "#eab308" : v >= 15 ? "#f97316" : "#ef4444";

const C = {
  bg: "#020817", panel: "#0b1120", card: "#0f172a", border: "#1e293b",
  muted: "#475569", dim: "#64748b", text: "#e2e8f0", head: "#f1f5f9",
  green: "#22c55e", yellow: "#eab308", orange: "#f97316", red: "#ef4444",
  blue: "#3b82f6", teal: "#14b8a6", indigo: "#818cf8",
};

const inputStyle = {
  background: C.card, border: `1px solid ${C.border}`, borderRadius: 6,
  color: C.text, padding: "8px 12px", fontSize: "0.92rem", width: "100%",
  outline: "none", fontFamily: "monospace",
};
const labelStyle = {
  color: C.muted, fontSize: "0.66rem", textTransform: "uppercase",
  letterSpacing: "0.08em", marginBottom: 4, display: "block",
};
const sectionStyle = {
  background: C.panel, border: `1px solid ${C.border}`, borderRadius: 10,
  padding: "18px 20px", marginBottom: 14,
};
const secTitleStyle = {
  color: C.dim, fontSize: "0.66rem", textTransform: "uppercase",
  letterSpacing: "0.1em", marginBottom: 14,
};

function ModalidadRow({ label, mix, costoEnvio, listing, costo, com, tax, pub, color, nota, mlunipub = 1 }) {
  const m = calcMargenModal(listing, costo, com, tax, costoEnvio, pub, mlunipub);
  const mc = margenColor(m);
  return (
    <div className="grid-modal" style={{
      background: C.card, border: `1px solid ${color}22`,
      borderLeft: `3px solid ${color}`, borderRadius: 6,
      padding: "10px 14px",
    }}>
      <div className="modal-label">
        <div style={{ color, fontWeight: 700, fontSize: "0.88rem" }}>{label}</div>
        {nota && <div style={{ color: C.muted, fontSize: "0.6rem", marginTop: 2 }}>{nota}</div>}
      </div>
      <div>
        <div style={labelStyle}>Mix</div>
        <div style={{ color: C.dim, fontFamily: "monospace", fontSize: "0.85rem" }}>{mix.toFixed(0)}%</div>
      </div>
      <div>
        <div style={labelStyle}>Costo envío</div>
        <div style={{ color: costoEnvio === 0 ? C.green : C.orange, fontFamily: "monospace", fontSize: "0.88rem" }}>
          {costoEnvio === 0 ? "$0" : `−${fmt$(costoEnvio)}`}
        </div>
      </div>
      <div>
        <div style={labelStyle}>Ingreso neto</div>
        <div style={{ fontFamily: "monospace", fontSize: "0.88rem" }}>
          {fmt$(listing * (1 - com / 100 - tax / 100 - pub / 100) - costoEnvio)}
        </div>
      </div>
      <div>
        <div style={labelStyle}>Margen</div>
        <span style={{ color: mc, fontWeight: 700, fontFamily: "monospace", fontSize: "1.05rem" }}>
          {fmtP(m)}
        </span>
      </div>
    </div>
  );
}

function PonderadoBox({ listing, costo, com, tax, pub, targetRef, mlunipub = 1 }) {
  const mF = calcMargenModal(listing, costo, com, tax, COSTO_FLEX_NETO, pub, mlunipub);
  const mC = calcMargenModal(listing, costo, com, tax, COSTO_COLECTA, pub, mlunipub);
  const mA = calcMargenModal(listing, costo, com, tax, 0, pub, mlunipub);
  const mixTotal = MIX.flex + MIX.colecta + MIX.acuerdo;
  const mP = (MIX.flex * mF + MIX.colecta * mC + MIX.acuerdo * mA) / mixTotal;
  const coberturaT = targetRef
    ? ((mA >= targetRef ? MIX.acuerdo : 0) + (mF >= targetRef ? MIX.flex : 0) + (mC >= targetRef ? MIX.colecta : 0))
    : null;

  return (
    <div className="grid-2col" style={{
      background: C.card, borderRadius: 6, padding: "10px 14px",
      border: `1px solid ${C.border}`,
    }}>
      <div>
        <div style={labelStyle}>Margen ponderado real</div>
        <span style={{ color: margenColor(mP), fontFamily: "monospace", fontWeight: 700, fontSize: "1.1rem" }}>
          {fmtP(mP)}
        </span>
        <div style={{ color: C.muted, fontSize: "0.6rem", marginTop: 2 }}>
          {MIX.flex.toFixed(0)}% Flex · {MIX.colecta.toFixed(0)}% Colecta · {MIX.acuerdo.toFixed(0)}% Acuerdo
        </div>
      </div>
      {coberturaT !== null && (
        <div>
          <div style={labelStyle}>Cobertura ≥ {targetRef}%</div>
          <span style={{ color: coberturaT >= 40 ? C.yellow : C.red, fontFamily: "monospace", fontWeight: 700, fontSize: "1.1rem" }}>
            {coberturaT.toFixed(0)}% ventas
          </span>
          <div style={{ color: C.muted, fontSize: "0.6rem", marginTop: 2 }}>
            {mC >= targetRef ? "Flex + Colecta + Acuerdo" : mF >= targetRef ? "Acuerdo + Flex" : mA >= targetRef ? "Solo Acuerdo" : "Ninguna modalidad"} llegan a {targetRef}%
          </div>
        </div>
      )}
    </div>
  );
}

function TargetRow({ label, target, costo, mlunipub, com, tax, pub, color }) {
  if (!costo || !mlunipub) return null;

  // Primero chequeamos si el target base ya cae >$33k
  const porganBase = solveForTarget(costo, mlunipub, com, tax, target, pub);
  const listingBase = costo * (1 + porganBase / 100) * mlunipub;
  const margenAlcanzado = calcBase(costo, porganBase, mlunipub, com, tax, pub).margen;
  // sobre33 si el listing supera $33k O si el target es inalcanzable en el tramo actual
  const sobre33 = listingBase >= 33000 || margenAlcanzado < target - 0.5;

  // Si cae >$33k, resolver para margen ponderado real en vez de base
  const porgan = sobre33
    ? solveForTargetPonderado(costo, mlunipub, com, tax, target, pub)
    : porganBase;
  const { listing, cf, margen } = calcBase(costo, porgan, mlunipub, com, tax, pub);

  const mF = sobre33 ? calcMargenModal(listing, costo, com, tax, COSTO_FLEX_NETO, pub, mlunipub) : null;
  const mC = sobre33 ? calcMargenModal(listing, costo, com, tax, COSTO_COLECTA, pub, mlunipub) : null;
  const mA = sobre33 ? calcMargenModal(listing, costo, com, tax, 0, pub, mlunipub) : null;
  const mP = sobre33 ? calcPonderado(listing, costo, com, tax, pub, mlunipub) : null;
  const cobertura = sobre33
    ? ((mA >= target ? MIX.acuerdo : 0) + (mF >= target ? MIX.flex : 0) + (mC >= target ? MIX.colecta : 0))
    : 100;

  return (
    <div style={{ background: C.card, border: `1px solid ${color}33`, borderLeft: `3px solid ${color}`, borderRadius: 6, padding: "12px 16px" }}>
      <div className="grid-5" style={{ marginBottom: sobre33 ? 14 : 0 }}>
        <div>
          <div style={labelStyle}>Objetivo</div>
          <div style={{ color, fontWeight: 700, fontSize: "0.92rem" }}>{label}</div>
          {sobre33 && <div style={{ color: C.dim, fontSize: "0.58rem", marginTop: 2 }}>ponderado real</div>}
        </div>
        <div>
          <div style={labelStyle}>Ganancia</div>
          <div style={{ color: C.head, fontFamily: "monospace", fontSize: "1.05rem" }}>{porgan}%</div>
        </div>
        <div>
          <div style={labelStyle}>Precio publicado</div>
          <div style={{ fontFamily: "monospace", fontSize: "0.92rem" }}>{fmt$(listing)}</div>
        </div>
        <div>
          <div style={labelStyle}>Costo Fijo</div>
          <div style={{ fontFamily: "monospace", fontSize: "0.92rem", color: sobre33 ? C.green : C.text }}>
            {sobre33 ? "$0" : `−${fmt$(cf)}`}
          </div>
          {sobre33 && <div style={{ color: C.dim, fontSize: "0.58rem" }}>envío gratis</div>}
        </div>
        <div>
          <div style={labelStyle}>{sobre33 ? "Margen ponderado" : "Margen"}</div>
          <span style={{ color, fontWeight: 700, fontFamily: "monospace", fontSize: "1.05rem" }}>
            {sobre33 ? fmtP(mP) : fmtP(margen)}
          </span>
          {sobre33 && <div style={{ color: C.muted, fontSize: "0.6rem" }}>base: {fmtP(margen)}</div>}
        </div>
      </div>

      {sobre33 && (
        <>
          <div style={{ height: 1, background: C.border, marginBottom: 12 }} />
          <div className="grid-3col" style={{ marginBottom: 10 }}>
            {[
              { lbl: "Flex", m: mF, mix: MIX.flex, c: C.teal },
              { lbl: "Colecta", m: mC, mix: MIX.colecta, c: C.indigo },
              { lbl: "Acuerdo", m: mA, mix: MIX.acuerdo, c: C.green },
            ].map(({ lbl, m, mix, c }) => (
              <div key={lbl} style={{ background: C.panel, borderRadius: 5, padding: "8px 10px", border: `1px solid ${C.border}` }}>
                <div style={{ color: c, fontSize: "0.68rem", fontWeight: 600, marginBottom: 4 }}>
                  {lbl} <span style={{ color: C.muted, fontWeight: 400 }}>({mix.toFixed(0)}%)</span>
                </div>
                <div style={{ color: margenColor(m), fontFamily: "monospace", fontWeight: 700, fontSize: "1.05rem" }}>
                  {fmtP(m)}
                </div>
              </div>
            ))}
          </div>
          <div style={{ background: C.panel, borderRadius: 5, padding: "8px 12px", border: `1px solid ${color}33` }}>
            <div style={labelStyle}>Cobertura ≥ {target}%</div>
            <span style={{ color: cobertura >= 40 ? C.yellow : C.red, fontFamily: "monospace", fontWeight: 700, fontSize: "1.05rem" }}>
              {cobertura.toFixed(0)}% ventas
            </span>
            <div style={{ color: C.muted, fontSize: "0.6rem" }}>
              {mC >= target ? "Flex + Colecta + Acuerdo" : mF >= target ? "Acuerdo + Flex" : mA >= target ? "solo Acuerdo" : "Ninguna modalidad"} llegan al target
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ─── TC Panel (manual) ────────────────────────────────────────────────────────
function TCPanel({ tcUSD, setTcUSD, tcEUR, setTcEUR }) {
  return (
    <div style={sectionStyle}>
      <div style={secTitleStyle}>Tipo de cambio</div>
      <div className="grid-2">
        <div>
          <label style={labelStyle}>USD → ARS</label>
          <input style={inputStyle} type="number" placeholder="ej: 1496"
            value={tcUSD} onChange={e => setTcUSD(e.target.value)} />
        </div>
        <div>
          <label style={labelStyle}>EUR → ARS</label>
          <input style={inputStyle} type="number" placeholder="ej: 1764"
            value={tcEUR} onChange={e => setTcEUR(e.target.value)} />
        </div>
      </div>
    </div>
  );
}

function Cotizador() {
  const [costo, setCosto]   = useState("");
  const [moneda, setMoneda] = useState("ARS");
  const [porgan, setPorgan] = useState("");
  const [mlunipub, setMl]   = useState("1");
  const [com, setCom]       = useState("14.5");
  const [tax, setTax]       = useState("0.1");
  const [tcUSD, setTcUSD]   = useState("");
  const [tcEUR, setTcEUR]   = useState("");
  const [conPub, setConPub] = useState(false);

  const costoRaw = parseFloat(costo) || 0;
  const tc = moneda === "USD" ? (parseFloat(tcUSD) || 0)
           : moneda === "EUR" ? (parseFloat(tcEUR) || 0)
           : 1;
  const costoN = costoRaw * (moneda === "ARS" ? 1 : tc);
  const porN   = parseFloat(porgan) || 0;
  const mlN    = parseFloat(mlunipub) || 1;
  const comN   = parseFloat(com) || 14;
  const taxN   = parseFloat(tax) || 0.1;
  const tcMissing = moneda !== "ARS" && tc === 0;
  const pubN    = conPub ? 11 : 0;

  const res     = costoN && porN ? calcBase(costoN, porN, mlN, comN, taxN, pubN) : null;
  const sobre33 = res && res.listing >= 33000;
  const resP    = sobre33 ? calcPonderado(res.listing, costoN, comN, taxN, pubN, mlN) : null;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.text,
      fontFamily: "'DM Sans', sans-serif", display: "flex", justifyContent: "center",
      padding: "32px 16px" }}>

      <div style={{ width: "100%", maxWidth: 720 }}>

        {/* Header */}
        <div style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 6 }}>
            <div style={{ width: 8, height: 8, borderRadius: "50%", background: C.blue, boxShadow: `0 0 8px ${C.blue}` }} />
            <span style={{ color: C.muted, fontSize: "0.72rem", letterSpacing: 2, textTransform: "uppercase" }}>
              Cotizador ML
            </span>
          </div>
          <h1 style={{ margin: 0, fontSize: "1.5rem", fontWeight: 700, color: C.head }}>
            Cotizador de Rentabilidad
          </h1>
          <div style={{ color: C.muted, fontSize: "0.72rem", marginTop: 4 }}>
            Incluye variabilidad de envíos para precios publicados &gt;$33k · Mix real del mes
          </div>
        </div>

        {/* TC Panel */}
        <TCPanel tcUSD={tcUSD} setTcUSD={setTcUSD} tcEUR={tcEUR} setTcEUR={setTcEUR} />

        {/* Inputs */}
        <div style={sectionStyle}>
          <div style={secTitleStyle}>Parámetros</div>
          <div className="grid-2" style={{ marginBottom: 14 }}>
            <div>
              <label style={labelStyle}>Costo unitario</label>
              <div style={{ display: "flex", gap: 8 }}>
                <select style={{ ...inputStyle, width: "auto", padding: "8px 10px", cursor: "pointer" }}
                  value={moneda} onChange={e => setMoneda(e.target.value)}>
                  <option value="ARS">ARS</option>
                  <option value="USD">USD</option>
                  <option value="EUR">EUR</option>
                </select>
                <input style={inputStyle} type="number" placeholder="ej: 15000"
                  value={costo} onChange={e => setCosto(e.target.value)} />
              </div>
              {moneda !== "ARS" && costoRaw > 0 && tc > 0 && (
                <div style={{ color: C.dim, fontSize: "0.62rem", marginTop: 4, fontFamily: "monospace" }}>
                  = {fmt$(costoN)} ARS (TC {fmt$(tc)})
                </div>
              )}
              {tcMissing && (
                <div style={{ color: C.orange, fontSize: "0.62rem", marginTop: 4 }}>
                  ⚠ Ingresá el TC arriba para calcular
                </div>
              )}
            </div>
            <div>
              <label style={labelStyle}>% en sistema</label>
              <input style={inputStyle} type="number" placeholder="ej: 350"
                value={porgan} onChange={e => setPorgan(e.target.value)} />
            </div>
          </div>
          <div className="grid-3">
            <div>
              <label style={labelStyle}>Publicado por</label>
              <input style={inputStyle} type="number" placeholder="1"
                value={mlunipub} onChange={e => setMl(e.target.value)} />
            </div>
            <div>
              <label style={labelStyle}>Comisión ML (%)</label>
              <input style={inputStyle} type="number" step="0.5"
                value={com} onChange={e => setCom(e.target.value)} />
            </div>
            <div>
              <label style={labelStyle}>Tax base (%)</label>
              <input style={inputStyle} type="number" step="0.1"
                value={tax} onChange={e => setTax(e.target.value)} />
            </div>
          </div>
          <div style={{ marginTop: 14 }}>
            <div
              onClick={() => setConPub(!conPub)}
              style={{
                display: "inline-flex", alignItems: "center", gap: 10, cursor: "pointer",
                background: conPub ? "#3b82f611" : C.card,
                border: `1px solid ${conPub ? C.blue : C.border}`,
                borderRadius: 6, padding: "8px 14px", userSelect: "none",
              }}
            >
              <div style={{
                width: 36, height: 20, borderRadius: 10, position: "relative",
                background: conPub ? C.blue : C.border, transition: "background 0.2s",
              }}>
                <div style={{
                  position: "absolute", top: 3, left: conPub ? 18 : 2,
                  width: 14, height: 14, borderRadius: "50%", background: "#fff",
                  transition: "left 0.2s",
                }} />
              </div>
              <span style={{ color: conPub ? C.blue : C.dim, fontSize: "0.82rem", fontWeight: 600 }}>
                Publicidad ML
              </span>
              {conPub && (
                <span style={{ color: C.muted, fontSize: "0.7rem", fontFamily: "monospace" }}>−11% sobre listing</span>
              )}
            </div>
          </div>
        </div>

        {/* Resultado actual */}
        {res && (
          <div style={sectionStyle}>
            <div style={secTitleStyle}>Resultado con % en sistema actual</div>
            <div className="grid-4" style={{ marginBottom: sobre33 ? 16 : 0 }}>
              <div>
                <div style={labelStyle}>Precio publicado</div>
                <div style={{ fontFamily: "monospace" }}>{fmt$(res.listing)}</div>
              </div>
              <div>
                <div style={labelStyle}>{sobre33 ? "Envío" : "Costo Fijo"}</div>
                <div style={{ fontFamily: "monospace", color: sobre33 ? C.muted : C.text }}>
                  {sobre33 ? "ver desglose ↓" : fmt$(res.cf)}
                </div>
              </div>
              <div>
                <div style={labelStyle}>Ingreso neto</div>
                <div style={{ fontFamily: "monospace" }}>{fmt$(res.ingreso - res.cf)}</div>
              </div>
              <div>
                <div style={labelStyle}>{sobre33 ? "Margen ponderado" : "Margen base"}</div>
                <span style={{ color: margenColor(sobre33 ? resP : res.margen), fontWeight: 700, fontFamily: "monospace", fontSize: "1.2rem" }}>
                  {sobre33 ? fmtP(resP) : fmtP(res.margen)}
                </span>
                {sobre33 && <div style={{ color: C.muted, fontSize: "0.6rem" }}>base (Acuerdo): {fmtP(res.margen)}</div>}
              </div>
            </div>

            {sobre33 && (
              <>
                <div style={{ height: 1, background: C.border, marginBottom: 14 }} />
                <div style={{ color: C.dim, fontSize: "0.65rem", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>
                  Margen real por modalidad · precio publicado &gt; $33k · Costo Fijo = $0
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 10 }}>
                  <ModalidadRow label="Flex" mix={MIX.flex} costoEnvio={COSTO_FLEX_NETO}
                    listing={res.listing} costo={costoN} com={comN} tax={taxN} pub={pubN} mlunipub={mlN} color={C.teal}
                    nota={`Prom. ponderado zona − reintegro ML ($765)`} />
                  <ModalidadRow label="Colecta" mix={MIX.colecta} costoEnvio={COSTO_COLECTA}
                    listing={res.listing} costo={costoN} com={comN} tax={taxN} pub={pubN} mlunipub={mlN} color={C.indigo}
                    nota="Mediana real · rango: $5k–$28k" />
                  <ModalidadRow label="Acuerdo" mix={MIX.acuerdo} costoEnvio={0}
                    listing={res.listing} costo={costoN} com={comN} tax={taxN} pub={pubN} mlunipub={mlN} color={C.green}
                    nota="Sin costo de envío" />
                </div>
                <PonderadoBox listing={res.listing} costo={costoN} com={comN} tax={taxN} pub={pubN} targetRef={25} mlunipub={mlN} />
              </>
            )}
          </div>
        )}

        {/* Targets */}
        {costoN > 0 && mlN > 0 && (
          <div style={sectionStyle}>
            <div style={secTitleStyle}>Ganancia sugerida por objetivo</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <TargetRow label="25% margen" target={25} costo={costoN} mlunipub={mlN}
                com={comN} tax={taxN} pub={pubN} color={C.yellow} />
              <TargetRow label="33% margen" target={33} costo={costoN} mlunipub={mlN}
                com={comN} tax={taxN} pub={pubN} color={C.green} />
            </div>
            <div style={{ marginTop: 12, padding: "8px 12px", background: C.card, borderRadius: 6,
              fontSize: "0.66rem", color: C.muted, lineHeight: 1.7 }}>
              Mix y costos de envío: valores de referencia · calibrar con datos reales de ventas · 119 ventas &gt;$33k semana 20/3 ·
              Flex neto: $3.816 ·
              Colecta mediana: $7.470 (muy variable, rango $6k–$84k) ·
              Acuerdo: sin envío
            </div>
          </div>
        )}

        {/* CF ref */}
        <div style={{ padding: "8px 14px", background: C.card, borderRadius: 6,
          fontSize: "0.66rem", color: C.muted, border: `1px solid ${C.border}` }}>
          Costo Fijo por tramo: &lt;$16k → $1.255 · $16k–$24k → $2.500 · $24k–$33k → $3.030 · &gt;$33k → $0
        </div>

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Cotizador />);
</script>
</body>
</html>
